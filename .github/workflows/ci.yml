name: C/C++ CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          build-essential \
          qt5-default \
          libqt5test5 \
          qtbase5-dev

    - name: Configure
      run: ./configure

    - name: Build
      run: make

    - name: Run tests
      run: make check

    - name: Create distribution
      run: make dist

    - name: Upload distribution
      uses: actions/upload-artifact@v4
      with:
        name: source-distribution
        path: IPCSharedDataPool-*.tar.gz
